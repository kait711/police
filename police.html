<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cảnh sát</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: #0b1c12; color: #effdf4; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 48px; }
    .top { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    h1 { margin: 0; font-size: 2.4rem; }
    .btn { border: 0; border-radius: 999px; padding: 12px 18px; font-weight: 700; cursor: pointer; }
    .logout { background: #ef4444; color: white; }
    .row { display: grid; gap: 18px; grid-template-columns: 1fr 1fr; }
    .panel { background: #13261a; border: 1px solid #2a5536; border-radius: 24px; padding: 22px; }
    .panel h2 { margin-top: 0; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; }
    .primary { background: #22c55e; color: white; }
    .warn { background: #facc15; color: #17210f; }
    textarea { width: 100%; min-height: 130px; margin-top: 10px; padding: 12px 14px; border-radius: 14px; border: 1px solid #376f48; background: #0a130d; color: white; font: inherit; }
    @media (max-width: 800px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <p>Vai trò: Cảnh sát</p>
        <h1>Hiện trường gần nhất và ca trực</h1>
      </div>
      <button class="btn logout" id="logoutButton">Đăng xuất</button>
    </div>
    <div class="row">
      <section class="panel">
        <h2>Vụ án gần nhất</h2>
        <p>Mã vụ việc: CASE-240419-17</p>
        <p>Khoảng cách: 1.2 km</p>
        <p>Địa điểm: 45 Nguyễn Huệ, Quận 1</p>
        <p>Mô tả: Tin báo về hành vi giật tài sản, đối tượng di chuyển bằng xe máy màu đen.</p>
        <div class="actions">
          <button class="btn primary">Nhận nhiệm vụ</button>
          <button class="btn primary">Gọi trụ sở</button>
        </div>
      </section>
      <section class="panel">
        <h2>Chấm công</h2>
        <p>Trạng thái ca trực: Chưa chấm công</p>
        <div class="actions">
          <button class="btn warn">Chấm công vào ca</button>
        </div>
        <h2 style="margin-top:24px;">Ghi chú nhanh</h2>
        <textarea>Nhập ghi chú tuần tra hoặc kết quả xác minh...</textarea>
      </section>
    </div>
  </div>
  <script>
    if (sessionStorage.getItem("policeRole") !== "police") {
      window.location.href = "index.html";
    }
    document.getElementById("logoutButton").addEventListener("click", () => {
      sessionStorage.removeItem("policeRole");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
