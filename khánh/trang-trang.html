<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khánh - Trang trắng mới</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #222222;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.8rem);
    }

    p {
      margin: 0 0 24px;
      color: #6b6b6b;
      line-height: 1.7;
    }

    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      text-decoration: none;
      color: #202020;
      font-weight: 700;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>Trang trắng mới</h1>
    <p>Đây là trang trắng mới trong thư mục Khánh. Bạn có thể dùng trang này để thêm nội dung hoặc chức năng khác sau.</p>
    <a href="./index.html">Quay lại trang Khánh</a>
  </section>
</body>
</html>
